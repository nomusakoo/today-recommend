name: Update Seoul Events

on:
  schedule:
    - cron: "0 21 * * *" # 매일 오전 6시(KST)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Seoul cultural events
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: node scripts/fetch-events.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --quiet --cached || git commit -m "chore: update Seoul events data"
          git push
